name: aa_podita
description: AA-PoDiTa - Posyandu Digital Terpadu Bayi Balita

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2
  excel: ^4.0.6
  file_saver: ^0.3.1
  syncfusion_flutter_xlsio: ^29.2.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/Logo_App_Square.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
